<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fandogh Cyber Rabbit Terminal 1.0</title>
    <style>
        @font-face {
            font-family: 'JetBrainsMono';
            src: url('https://cdnjs.cloudflare.com/ajax/libs/jetbrains-mono/2.304/web/JetBrainsMono-Regular.woff2') format('woff2');
        }

        :root {
            --bg-color: #050505;
            --terminal-color: #39ff14; /* سبز نئونی */
            --highlight-color: #ffffff;
            --text-color: #e0e0e0;
            --glitch-color: #ff007f;
            --shadow-color: rgba(57, 255, 20, 0.4);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrainsMono', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.2;
            z-index: 10;
        }

        .terminal-wrapper {
            width: 92%;
            max-width: 750px;
            height: 85vh;
            border: 2px solid var(--terminal-color);
            border-radius: 12px;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px var(--shadow-color);
            position: relative;
            z-index: 5;
        }

        .terminal-header {
            background-color: var(--terminal-color);
            color: #000;
            padding: 8px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: var(--terminal-color); border-radius: 3px; }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; }

        .message-content {
            padding: 12px 18px;
            border-radius: 14px;
            line-height: 1.6;
            font-size: 14.5px;
            word-wrap: break-word;
        }

        .user .message-content {
            background-color: var(--terminal-color);
            color: #000;
            border-bottom-right-radius: 2px;
            font-weight: bold;
            box-shadow: 0 0 10px var(--shadow-color);
        }

        .ai .message-content {
            color: var(--terminal-color);
            border-bottom-left-radius: 2px;
            background: rgba(57, 255, 20, 0.05);
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        .ai-avatar {
            font-size: 15px;
            color: var(--terminal-color);
            font-weight: bold;
            margin-bottom: 4px;
            display: inline-block;
        }

        .typing-effect { display: inline; }
        .cursor {
            display: inline-block;
            width: 8px; height: 16px;
            background-color: var(--terminal-color);
            vertical-align: middle;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .input-area {
            padding: 12px 20px;
            border-top: 1px solid rgba(57, 255, 20, 0.3);
            background-color: #000;
            display: flex;
            gap: 15px;
            align-items: center;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--highlight-color);
            font-family: 'JetBrainsMono', monospace;
            font-size: 15px;
            outline: none;
        }

        .input-area::before {
            content: "🐰 FANDOGH.>>";
            color: var(--terminal-color);
            font-weight: bold;
        }

        .send-btn {
            background: transparent;
            border: 1px solid var(--terminal-color);
            color: var(--terminal-color);
            padding: 8px 18px;
            border-radius: 6px;
            font-family: 'JetBrainsMono', monospace;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            background-color: var(--terminal-color);
            color: #000;
            box-shadow: 0 0 12px var(--shadow-color);
        }
    </style>
</head>
<body>
    <div class="terminal-wrapper">
        <div class="terminal-header">
            <span>💻 FANDOGH_CORE v4.0 [Cyber Rabbit Mode]</span>
            <span>🐰🐾</span>
        </div>
        <div class="chat-container" id="chat-container"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="پیام خود را بنویسید..." autocomplete="off">
            <button class="send-btn" id="send-btn">EXEC</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let chatHistory = [];

        function typeMessage(aiMessageBody) {
            const aiMessageDiv = document.createElement('div');
            aiMessageDiv.className = 'message ai';
            const aiContentDiv = document.createElement('div');
            aiContentDiv.className = 'message-content';
            
            const avatarSpan = document.createElement('span');
            avatarSpan.className = 'ai-avatar';
            avatarSpan.textContent = '🐰 [[ فندق هکر ]] : ';
            
            const textSpan = document.createElement('span');
            textSpan.className = 'typing-effect';
            
            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'cursor';
            
            aiContentDiv.appendChild(avatarSpan);
            aiContentDiv.appendChild(textSpan);
            aiContentDiv.appendChild(cursorSpan);
            aiMessageDiv.appendChild(aiContentDiv);
            chatContainer.appendChild(aiMessageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            const words = aiMessageBody.split(' ');
            let i = 0;
            
            const interval = setInterval(() => {
                if (i < words.length) {
                    textSpan.textContent += words[i] + ' ';
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    i++;
                } else {
                    clearInterval(interval);
                    aiContentDiv.removeChild(cursorSpan);
                }
            }, 90);
        }

        function addUserMessage(message) {
            const userMessageDiv = document.createElement('div');
            userMessageDiv.className = 'message user';
            const userContentDiv = document.createElement('div');
            userContentDiv.className = 'message-content';
            userContentDiv.textContent = message;
            userMessageDiv.appendChild(userContentDiv);
            chatContainer.appendChild(userMessageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value;
            if (message.trim() === '') return;

            userInput.value = '';
            userInput.focus();
            addUserMessage(message);

            chatHistory.push({ role: "user", content: message });

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ messages: chatHistory })
                });

                const data = await response.json();
                if (data.response) {
                    typeMessage(data.response);
                    chatHistory.push({ role: "assistant", content: data.response });
                } else {
                    typeMessage("SYSTEM_ERROR:: ACCESS DENIED 🐰");
                }
            } catch (error) {
                typeMessage("CONNECTION_ERROR:: SERVER UNREACHABLE 🐾");
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
